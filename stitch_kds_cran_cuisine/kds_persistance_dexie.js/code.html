<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Dexie.js for Local Persistence -->
<script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/dexie-react-hooks@latest/dist/dexie-react-hooks.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#f59e0b",
                        "on-primary-container": "#613b00",
                        "tertiary": "#51e77b",
                        "on-tertiary-fixed": "#002109",
                        "background": "#131313",
                        "on-tertiary": "#003915",
                        "surface": "#131313",
                        "outline": "#a08e7a",
                        "surface-tint": "#ffb95f",
                        "on-error": "#690005",
                        "inverse-primary": "#855300",
                        "on-surface-variant": "#d8c3ad",
                        "surface-container-low": "#1c1b1b",
                        "secondary-fixed": "#ffdbca",
                        "secondary-container": "#ec6a06",
                        "primary-fixed": "#ffddb8",
                        "tertiary-container": "#2bca62",
                        "surface-container-lowest": "#0e0e0e",
                        "on-primary": "#472a00",
                        "inverse-on-surface": "#313030",
                        "on-tertiary-container": "#004f20",
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353534",
                        "secondary-fixed-dim": "#ffb690",
                        "on-primary-fixed-variant": "#653e00",
                        "error-container": "#93000a",
                        "surface-variant": "#353534",
                        "on-secondary-container": "#4a1c00",
                        "surface-container": "#201f1f",
                        "surface-bright": "#3a3939",
                        "outline-variant": "#534434",
                        "surface-container-high": "#2a2a2a",
                        "on-surface": "#e5e2e1",
                        "primary-fixed-dim": "#ffb95f",
                        "tertiary-fixed": "#6bff8f",
                        "on-tertiary-fixed-variant": "#005321",
                        "tertiary-fixed-dim": "#4ae176",
                        "on-background": "#e5e2e1",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e5e2e1",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#341100",
                        "primary": "#ffc174",
                        "on-primary-fixed": "#2a1700",
                        "secondary": "#ffb690",
                        "on-secondary-fixed-variant": "#783200",
                        "on-secondary": "#552100"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .order-card-urgent {
            border-left: 4px solid #ffb4ab;
        }
        .order-card-warning {
            border-left: 4px solid #ffb690;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #131313;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<div id="root"></div>
<script type="text/babel">
        const { useLiveQuery } = DexieReactHooks;

        // DB Setup
        const db = new Dexie('AtelierPOSDatabase');
        db.version(1).stores({
            menuItems: '++id, name, category, isAvailable',
            tables: 'id, status',
            orders: '++id, tableId, status, createdAt',
            reservations: '++id, date, time, status'
        });

        // Initial Seed if empty
        const seedData = async () => {
            const count = await db.orders.count();
            if (count === 0) {
                await db.orders.bulkAdd([
                    { tableId: 12, status: 'en_attente', items: [{ name: "Burger L'Atelier", quantity: 2, customization: 'CUI: BLEU' }, { name: 'Tartare de Bœuf', quantity: 1, customization: 'SANS OIGNON' }, { name: 'Frites Maison', quantity: 3 }], createdAt: new Date(Date.now() - 1080000) },
                    { tableId: 4, status: 'en_attente', items: [{ name: 'Entrecôte 300g', quantity: 1, customization: 'À POINT' }, { name: 'Salade César', quantity: 1 }], createdAt: new Date(Date.now() - 540000) },
                    { tableId: 22, status: 'en_attente', items: [{ name: 'Pavé de Saumon', quantity: 4 }], createdAt: new Date(Date.now() - 180000) },
                    { tableId: 1, status: 'en_preparation', items: [{ name: 'Risotto Truffe', quantity: 2 }, { name: 'Salade Verte', quantity: 1, done: true }], createdAt: new Date(Date.now() - 770000), notes: 'EMPORTER' },
                    { tableId: 9, status: 'en_preparation', items: [{ name: 'Pizza Regina', quantity: 3 }, { name: 'Calzone', quantity: 1 }], createdAt: new Date(Date.now() - 378000) },
                    { tableId: 15, status: 'pret', updatedAt: new Date(Date.now() - 600000), createdAt: new Date() },
                    { tableId: 2, status: 'pret', updatedAt: new Date(Date.now() - 840000), createdAt: new Date() }
                ]);
            }
        };
        seedData();

        const KDSApp = () => {
            const orders = useLiveQuery(() => 
                db.orders.where('status').anyOf(['en_attente', 'en_preparation', 'pret']).toArray()
            ) || [];

            const updateStatus = async (id, status) => {
                await db.orders.update(id, { 
                    status,
                    updatedAt: new Date()
                });
            };

            const getTimeDiff = (date) => {
                const diff = Math.floor((Date.now() - new Date(date)) / 60000);
                return diff;
            };

            const formatTime = (date) => {
                const d = new Date(date);
                return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            };

            const pendingOrders = orders.filter(o => o.status === 'en_attente');
            const preparingOrders = orders.filter(o => o.status === 'en_preparation');
            const readyOrders = orders.filter(o => o.status === 'pret').sort((a,b) => b.updatedAt - a.updatedAt);

            return (
                <div class="flex">
                    {/* Sidebar */}
                    <nav class="fixed left-0 top-0 h-full flex flex-col py-6 bg-[#1C1B1B] w-64 shadow-[8px_0_24px_rgba(0,0,0,0.4)] z-50">
                        <div class="px-6 mb-8">
                            <h1 class="text-[#F5F0EB] font-bold font-headline text-xl tracking-tight">L'Atelier POS</h1>
                            <p class="text-[#F5F0EB]/40 text-xs font-label uppercase tracking-widest mt-1">Cuisine / KDS</p>
                        </div>
                        <div class="flex-1 px-3 space-y-1">
                            <a class="flex items-center gap-4 text-[#F5F0EB]/60 px-4 py-3 hover:text-[#F5F0EB] hover:bg-[#353534]/50 transition-all" href="#">
                                <span class="material-symbols-outlined">restaurant_menu</span>
                                <span class="text-sm font-medium">Menu</span>
                            </a>
                            <a class="flex items-center gap-4 bg-[#353534] text-[#FFC174] rounded-lg px-4 py-3 border-l-4 border-[#FFC174] transition-all" href="#">
                                <span class="material-symbols-outlined">receipt_long</span>
                                <span class="text-sm font-medium">Commandes</span>
                            </a>
                            <a class="flex items-center gap-4 text-[#F5F0EB]/60 px-4 py-3 hover:text-[#F5F0EB] hover:bg-[#353534]/50 transition-all" href="#">
                                <span class="material-symbols-outlined">table_restaurant</span>
                                <span class="text-sm font-medium">Tables</span>
                            </a>
                            <a class="flex items-center gap-4 text-[#F5F0EB]/60 px-4 py-3 hover:text-[#F5F0EB] hover:bg-[#353534]/50 transition-all" href="#">
                                <span class="material-symbols-outlined">dashboard</span>
                                <span class="text-sm font-medium">Tableau de bord</span>
                            </a>
                            <a class="flex items-center gap-4 text-[#F5F0EB]/60 px-4 py-3 hover:text-[#F5F0EB] hover:bg-[#353534]/50 transition-all" href="#">
                                <span class="material-symbols-outlined">settings</span>
                                <span class="text-sm font-medium">Paramètres</span>
                            </a>
                        </div>
                        <div class="mt-auto px-6 space-y-4">
                            <div class="flex items-center gap-3 py-4 border-t border-outline-variant/10">
                                <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary overflow-hidden">
                                    <img class="object-cover w-full h-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCu5WGdnAs1pCwjfsSfWC3Ri1gDh1oz0DcgRqcwL-wIWXMllysD-a3XO0s5bCliHEvzGGO1xAFBxsmAK8idy6o2YVhe6y6K7MhMQXlZ3XnVwKi3Fd7saNRgoM19F3cDSHrabyBmOXR5viXW2DnKXLSxKbJLO838oO76_rQMXgLR2WhsO-DSYYaZbaqz6Zg5GH8ld8O_qPwjJGgWmj5luytQOXzQJWhF8G5PUQ0ehI2Zxvow1b2hkAUdb7elQC4bf5vTgtNTiLwPRfIV" alt="Chef"/>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-on-surface">Chef d'Atelier</p>
                                    <p class="text-[10px] text-on-surface/50 uppercase tracking-tighter">Service Midi</p>
                                </div>
                            </div>
                            <button class="w-full flex items-center justify-center gap-2 py-3 bg-error-container text-on-error-container rounded-lg text-xs font-bold uppercase tracking-widest hover:brightness-110 transition-all">
                                <span class="material-symbols-outlined text-sm">emergency_home</span>
                                Urgence
                            </button>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main class="ml-64 min-h-screen flex-1 flex flex-col">
                        <header class="h-16 flex justify-between items-center w-full px-8 bg-[#131313] sticky top-0 z-40">
                            <div class="flex items-center gap-4">
                                <span class="material-symbols-outlined text-[#FFC174]">menu</span>
                                <h2 class="font-headline font-bold text-lg uppercase tracking-wider text-[#FFC174]">Écran de Production Cuisine</h2>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="flex items-center gap-2 px-3 py-1 bg-surface-container-high rounded text-xs font-mono">
                                    <span class="w-2 h-2 rounded-full bg-tertiary"></span>
                                    Serveur Connecté
                                </div>
                                <div class="flex gap-4">
                                    <span class="material-symbols-outlined text-[#F5F0EB] cursor-pointer hover:bg-[#353534] p-2 rounded-full transition-colors">sync</span>
                                    <span class="material-symbols-outlined text-[#F5F0EB] cursor-pointer hover:bg-[#353534] p-2 rounded-full transition-colors">account_circle</span>
                                </div>
                            </div>
                        </header>

                        <div class="flex-1 p-6 grid grid-cols-3 gap-6 overflow-hidden">
                            {/* Column: En attente */}
                            <section class="flex flex-col h-full bg-surface-container-low rounded-xl overflow-hidden shadow-2xl">
                                <header class="p-4 bg-surface-container-high flex justify-between items-center border-b border-outline-variant/5">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-on-surface-variant"></span>
                                        <h3 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">En attente</h3>
                                    </div>
                                    <span class="bg-surface-container-highest px-2 py-1 rounded font-mono text-xs font-bold">{pendingOrders.length.toString().padStart(2, '0')}</span>
                                </header>
                                <div class="flex-1 overflow-y-auto p-4 space-y-4">
                                    {pendingOrders.map(order => {
                                        const waitingTime = getTimeDiff(order.createdAt);
                                        const urgencyClass = waitingTime > 15 ? 'order-card-urgent' : waitingTime > 8 ? 'order-card-warning' : '';
                                        const timeColor = waitingTime > 15 ? 'text-error' : waitingTime > 8 ? 'text-secondary' : 'text-on-surface';

                                        return (
                                            <div key={order.id} class={`bg-surface-container-highest rounded-lg overflow-hidden shadow-lg group ${urgencyClass}`}>
                                                <div class="p-4 flex justify-between items-start">
                                                    <div class="flex flex-col">
                                                        <span class={`font-mono text-xs font-bold tracking-tighter ${timeColor}`}>COMMANDE #{order.id}</span>
                                                        <h4 class="font-headline font-black text-4xl text-on-surface">T-{order.tableId}</h4>
                                                    </div>
                                                    <div class="text-right">
                                                        <p class={`font-mono text-xl font-bold ${timeColor}`}>{formatTime(order.createdAt)}</p>
                                                        <p class="text-[10px] text-on-surface/40 uppercase font-bold">Depuis {waitingTime} min</p>
                                                    </div>
                                                </div>
                                                <div class="px-4 pb-4 space-y-2">
                                                    {order.items.map((item, idx) => (
                                                        <div key={idx} class="flex justify-between items-center py-1 border-b border-outline-variant/5">
                                                            <span class="text-sm font-medium"><span class="text-primary font-bold mr-2">{item.quantity}x</span> {item.name}</span>
                                                            {item.customization && <span class="text-[10px] font-mono text-on-surface/50 uppercase">{item.customization}</span>}
                                                        </div>
                                                    ))}
                                                </div>
                                                <button 
                                                    onClick={() => updateStatus(order.id, 'en_preparation')}
                                                    class="w-full py-4 bg-primary text-on-primary font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                                    <span class="material-symbols-outlined text-sm">play_arrow</span>
                                                    Commencer
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>

                            {/* Column: En préparation */}
                            <section class="flex flex-col h-full bg-surface-container-low rounded-xl overflow-hidden shadow-2xl">
                                <header class="p-4 bg-surface-container-high flex justify-between items-center border-b border-outline-variant/5">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-primary"></span>
                                        <h3 class="font-headline font-bold text-sm uppercase tracking-widest text-primary">En préparation</h3>
                                    </div>
                                    <span class="bg-surface-container-highest px-2 py-1 rounded font-mono text-xs font-bold text-primary">{preparingOrders.length.toString().padStart(2, '0')}</span>
                                </header>
                                <div class="flex-1 overflow-y-auto p-4 space-y-4">
                                    {preparingOrders.map(order => (
                                        <div key={order.id} class="bg-surface-container-highest rounded-lg overflow-hidden shadow-lg border-l-4 border-primary/40">
                                            <div class="p-4 flex justify-between items-start">
                                                <div class="flex flex-col">
                                                    <div class="flex items-center gap-2">
                                                        <span class="font-mono text-xs text-on-surface/40 font-bold tracking-tighter">COMMANDE #{order.id}</span>
                                                        {order.notes && <span class="text-[10px] bg-primary/10 text-primary px-1 font-bold">{order.notes}</span>}
                                                    </div>
                                                    <h4 class="font-headline font-black text-4xl text-on-surface">
                                                        {order.notes === 'EMPORTER' ? `WEB-${order.id % 10}` : `T-${order.tableId}`}
                                                    </h4>
                                                </div>
                                                <div class="text-right">
                                                    <p class="font-mono text-xl text-on-surface font-bold">{formatTime(order.createdAt)}</p>
                                                    <p class="text-[10px] text-on-surface/40 uppercase font-bold">Prépa: {getTimeDiff(order.createdAt)}:00</p>
                                                </div>
                                            </div>
                                            <div class="px-4 pb-4 space-y-2">
                                                {order.items.map((item, idx) => (
                                                    <div key={idx} class="flex justify-between items-center py-1 border-b border-outline-variant/5">
                                                        <span class={`text-sm font-medium ${item.done ? 'line-through opacity-40' : ''}`}>
                                                            <span class="text-primary font-bold mr-2">{item.quantity}x</span> {item.name}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                            <button 
                                                onClick={() => updateStatus(order.id, 'pret')}
                                                class="w-full py-4 bg-tertiary text-on-tertiary font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                                <span class="material-symbols-outlined text-sm">check_circle</span>
                                                Prêt
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* Column: Prêt */}
                            <section class="flex flex-col h-full bg-surface-container-low rounded-xl overflow-hidden shadow-2xl opacity-80">
                                <header class="p-4 bg-surface-container-high flex justify-between items-center border-b border-outline-variant/5">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-tertiary"></span>
                                        <h3 class="font-headline font-bold text-sm uppercase tracking-widest text-tertiary">Prêt</h3>
                                    </div>
                                    <span class="bg-surface-container-highest px-2 py-1 rounded font-mono text-xs font-bold text-tertiary">{readyOrders.length.toString().padStart(2, '0')}</span>
                                </header>
                                <div class="flex-1 overflow-y-auto p-4 space-y-4">
                                    {readyOrders.map(order => (
                                        <div key={order.id} class="bg-surface-container-highest/50 rounded-lg overflow-hidden border-l-4 border-tertiary/20 grayscale hover:grayscale-0 transition-all">
                                            <div class="p-4 flex justify-between items-center">
                                                <div>
                                                    <span class="font-mono text-[10px] text-on-surface/30 font-bold">T-{order.tableId} • #{order.id}</span>
                                                    <h4 class="font-headline font-bold text-xl text-on-surface/50">Prêt à {formatTime(order.updatedAt || new Date())}</h4>
                                                </div>
                                                <span class="material-symbols-outlined text-tertiary/50">done_all</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div class="p-4 mt-auto">
                                    <button class="w-full py-3 bg-surface-container-highest text-on-surface/60 font-bold uppercase tracking-widest text-[10px] rounded-lg hover:text-on-surface transition-colors">
                                        Voir l'historique complet
                                    </button>
                                </div>
                            </section>
                        </div>

                        {/* Footer */}
                        <footer class="h-12 bg-surface-container-lowest flex items-center px-8 justify-between border-t border-outline-variant/5">
                            <div class="flex gap-8 items-center text-[10px] font-bold uppercase tracking-tighter">
                                <div class="flex items-center gap-2">
                                    <span class="text-on-surface/40">Temps moyen:</span>
                                    <span class="text-tertiary font-mono">12m 45s</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-on-surface/40">Commandes/h:</span>
                                    <span class="text-primary font-mono">{orders.length + 18}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-on-surface/40">Urgence Level:</span>
                                    <span class="text-error font-mono">STABLE</span>
                                </div>
                            </div>
                            <div class="text-[10px] font-mono text-on-surface/30">
                                DERNIÈRE SYNCHRO: {new Date().toLocaleTimeString()}
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KDSApp />);
    </script>
</body></html>
